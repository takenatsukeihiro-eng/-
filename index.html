  <body>
    <div id="app" class="no-print">
      <!-- サイドバー -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <i data-lucide="palmtree"></i>
            <div class="logo-text">
              <span class="brand-sub">勝浦東急GC</span>
              <span class="brand-main">Green Master</span>
            </div>
          </div>
        </div>
        <nav class="hole-nav">
          <ul id="hole-list">
            <!-- 18ホールのリストがここに生成されます -->
          </ul>
        </nav>
        <div class="sidebar-footer">
          <button id="print-out" class="btn-secondary full-width">
            <i data-lucide="printer"></i> OUT (1-9) 印刷
          </button>
          <button id="print-in" class="btn-secondary full-width" style="margin-top: 0.5rem;">
            <i data-lucide="printer"></i> IN (10-18) 印刷
          </button>
          <div class="data-mgmt" style="margin-top: 1rem; display: flex; gap: 0.5rem;">
            <button id="export-data" class="btn-outline full-width" style="font-size: 0.7rem; padding: 0.4rem;">
              <i data-lucide="download" style="width: 12px; height: 12px;"></i> データ保存
            </button>
            <button id="import-data" class="btn-outline full-width" style="font-size: 0.7rem; padding: 0.4rem;">
              <i data-lucide="upload" style="width: 12px; height: 12px;"></i> 復元
            </button>
            <input type="file" id="import-file" style="display: none;" accept=".json">
          </div>
          <div class="version-info" style="font-size: 0.6rem; color: #94a3b8; margin-top: 1rem; text-align: center;">
            Version: 1.0.3 (Updated: 2026-04-25)
          </div>
        </div>
      </aside>

      <!-- メインコンテンツ -->
      <main class="main-content">
        <header class="top-bar">
          <div class="current-hole-info">
            <h1 id="current-hole-title">第1ホール</h1>
            <span id="current-hole-par" class="badge">PAR 4</span>
            <div class="green-select-group">
              <button id="select-green-a" class="btn-green-tab active">Aグリーン</button>
              <button id="select-green-b" class="btn-green-tab">Bグリーン</button>
            </div>
            <span id="current-hole-yard" class="badge badge-outline">343 YDS</span>
          </div>
          <div class="user-actions">
            <div id="current-date-display" class="date-display">2024年4月25日</div>
          </div>
        </header>

        <div class="dashboard-grid">
          <!-- グリーンマップ -->
          <section class="card map-card">
            <div class="card-header">
              <h2><i data-lucide="map"></i> グリーンマップ</h2>
              <div class="map-controls">
                <button id="edit-green" title="グリーン形状編集"><i data-lucide="edit-3"></i> 編集</button>
                <button id="reset-view" title="表示リセット"><i data-lucide="maximize"></i></button>
              </div>
            </div>
            <div class="map-container" id="map-container">
              <!-- SVG グリーンマップがここに描画されます -->
            </div>
            <div class="hole-description" id="hole-desc">
              <!-- ホール解説 -->
            </div>
          </section>

          <!-- 操作・履歴側パネル -->
          <div class="side-panels">
            <!-- ピン生成パネル -->
            <section class="card control-card">
              <div class="card-header">
                <h2><i data-lucide="settings"></i> ピンポジション生成</h2>
              </div>
              <div class="control-body">
                <div class="constraints-info">
                  <p><i data-lucide="info"></i> 制約条件:</p>
                  <ul>
                    <li>エッジから4ヤード以上</li>
                    <li>前日位置から5m以上</li>
                  </ul>
                </div>
                <div class="control-actions" style="display: flex; gap: 0.5rem;">
                  <button id="generate-pin" class="btn-primary" style="flex: 1;">
                    <i data-lucide="refresh-cw"></i> 自動生成
                  </button>
                  <button id="reset-pin" class="btn-secondary" title="ピンを削除">
                    <i data-lucide="x-circle"></i> クリア
                  </button>
                </div>
                <div id="pin-coords" class="coords-display">
                  <div class="coord-item">
                    <span class="coord-label">手前/奥(+)</span>
                    <span id="val-y" class="coord-value">--</span>
                  </div>
                  <div class="coord-item">
                    <span class="coord-label">左/右(+)</span>
                    <span id="val-x" class="coord-value">--</span>
                  </div>
                </div>
              </div>
            </section>

            <!-- 履歴カレンダー -->
            <section class="card history-card">
              <div class="card-header">
                <h2><i data-lucide="calendar"></i> 配置履歴</h2>
                <button id="clear-history" class="btn-icon" title="履歴をすべて削除"><i data-lucide="trash-2"></i></button>
              </div>
              <div id="calendar-container">
                <!-- カレンダーがここに描画されます -->
              </div>
              <div class="history-list" id="history-items">
                <!-- 選択した日のデータが表示されます -->
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>

    <!-- 印刷用隠しエリア -->
    <div id="print-area" class="print-only"></div>

    <!-- 編集用モーダル -->
    <div id="editor-modal" class="modal no-print">
      <div class="modal-content">
        <div class="modal-header">
          <h3>グリーン形状編集</h3>
          <button id="close-editor" class="btn-icon"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p class="help-text">点をドラッグして形状を変更してください。</p>
          <div id="editor-container" class="editor-svg-container"></div>
        </div>
        <div class="modal-footer">
          <button id="save-green" class="btn-primary">保存する</button>
          <button id="reset-green" class="btn-secondary">初期化</button>
        </div>
      </div>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => {
              console.log('Service Worker registered');
              
              // アップデートのチェック
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      console.log('New content available, updating...');
                    }
                  }
                };
              };
            })
            .catch(err => console.log('Service Worker registration failed', err));
        });

        // 新しいサービスワーカーが有効になったらページを自動リロード
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
